<body class="bg-bg-canvas text-text-primary min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[30%] bg-secondary/5 blur-[100px] rounded-full"></div>
<div class="absolute inset-0 bg-noise"></div>
</div>
<!-- Header Navigation -->
<nav class="relative z-50 flex items-center justify-between px-gutter pt-safe-area-top h-16">
<div class="flex items-center">
<span class="font-headline-md text-headline-md font-black text-primary tracking-tighter">PropVeil</span>
</div>
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-text-primary transition-transform active:scale-90">
<span class="material-symbols-outlined">chevron_left</span>
</button>
</nav>
<!-- Main Content -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-gutter text-center pb-safe-area-bottom">
<!-- Illustration Section -->
<div class="relative mb-section-gap">
<div class="w-32 h-32 rounded-full bg-surface-2 flex items-center justify-center biometric-glow border border-primary/20 relative overflow-hidden">
<!-- Inner Pulse Effect -->
<div class="absolute inset-0 bg-primary/10 animate-pulse"></div>
<span class="material-symbols-outlined text-[64px] text-primary relative z-10" data-icon="fingerprint">fingerprint</span>
</div>
<!-- Smaller secondary icon for FaceID representation -->
<div class="absolute -bottom-2 -right-2 w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center border border-border-subtle shadow-xl">
<span class="material-symbols-outlined text-[24px] text-secondary" data-icon="face">face</span>
</div>
</div>
<!-- Copy Section -->
<section class="max-w-xs mb-section-gap">
<h1 class="font-headline-lg text-headline-lg font-black text-text-primary mb-element-gap leading-tight">
                Enable Biometrics
            </h1>
<p class="font-body-md text-body-md text-text-secondary">
                Use Face ID or Touch ID for faster access and secure transaction approvals.
            </p>
</section>
<!-- Spacer for layout balance -->
<div class="flex-1"></div>
<!-- Security Info Card -->
<div class="w-full bg-bg-surface-2 border border-border-subtle rounded-[20px] p-card-padding mb-element-gap flex items-start gap-4 text-left">
<span class="material-symbols-outlined text-primary shrink-0" data-icon="verified_user">verified_user</span>
<p class="font-body-sm text-body-sm text-text-secondary leading-relaxed">
                Biometric data is stored securely on your device and is never shared with PropVeil.
            </p>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-4">
<button class="w-full h-[56px] bg-primary hover:bg-accent-hover text-on-primary font-semibold text-body-md rounded-[20px] transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98]">
<span>Enable Biometrics</span>
</button>
<button class="w-full h-[56px] bg-transparent text-primary border border-primary/30 hover:bg-primary/5 font-semibold text-body-md rounded-[20px] transition-all duration-300 active:scale-[0.98]">
                Maybe Later
            </button>
</div>
</main>
<!-- Bottom Indicator Decoration -->
<div class="h-safe-area-bottom w-full flex justify-center items-end pb-2">
<div class="w-32 h-1 bg-surface-container-highest rounded-full"></div>
</div>
<script>
        // Micro-interaction for the fingerprint icon
        const fingerprint = document.querySelector('[data-icon="fingerprint"]');
        if (fingerprint) {
            fingerprint.parentElement.addEventListener('click', () => {
                fingerprint.classList.add('scale-110', 'text-primary-fixed');
                setTimeout(() => {
                    fingerprint.classList.remove('scale-110', 'text-primary-fixed');
                }, 400);
            });
        }

        // Logic for handling "Maybe Later" and "Enable" buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const text = e.currentTarget.textContent.trim();
                console.log(`User clicked: ${text}`);
                // Add haptic feedback simulation
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });
    </script>
<script src="nav_interceptor.js"></script>
