<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Propveil - Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            theme: {
                extend: {

                        "error": "#ffb4ab",
                        "primary-fixed": "#89f5e3",
                        "danger": "#EF4444",
                        "surface-tint": "#6bd9c7",
                        "primary": "#6bd9c7",
                        "surface-variant": "#2a3548",
                        "on-surface": "#d7e3fc",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#1f2a3d",
                        "on-secondary-fixed-variant": "#374763",
                        "surface": "#071325",
                        "on-tertiary-fixed-variant": "#604100",
                        "inverse-surface": "#d7e3fc",
                        "outline": "#879390",
                        "on-background": "#d7e3fc",
                        "surface-bright": "#2e394d",
                        "on-secondary": "#20314b",
                        "on-tertiary-fixed": "#281900",
                        "surface-dim": "#071325",

                        "success": "#10B981",

                        "border-subtle": "#1E293B",

                        "coral-accent": "#FF7A5A",

                        "on-secondary-container": "#a5b6d6",

<style>
        body {
            background-color: theme('colors.bg-canvas');
            color: theme('colors.text-primary');
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* Custom Checkbox Toggle */
        .toggle-checkbox:checked {
            right: 0;
            border-color: theme('colors.primary');
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: theme('colors.primary');
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col relative w-full max-w-[390px] mx-auto bg-bg-canvas overflow-x-hidden">
<!-- TopAppBar Container -->
<header class="w-full flex justify-between items-center px-gutter h-safe-area-top pt-8 pb-4 bg-background dark:bg-background z-50">
<!-- Back Button -->
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary text-2xl">chevron_left</span>
</button>
<!-- Progress Indicator -->
<div class="flex flex-col items-center flex-1 mx-4">
<span class="text-label-caps font-label-caps text-text-secondary mb-2">STEP 4 OF 4</span>
<div class="w-full h-1 bg-surface-2 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-full"></div>
</div>
</div>
<!-- Spacer for alignment -->
<div class="w-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-gutter pt-section-gap pb-safe-area-bottom flex flex-col no-scrollbar overflow-y-auto">
<!-- Header Section -->
<div class="mb-section-gap">
<h1 class="text-headline-lg font-headline-lg text-text-primary mb-2">Tell us about you</h1>
<p class="text-body-md font-body-md text-text-secondary">Complete your profile to get started with Propveil.</p>
</div>
<!-- Avatar Uploader -->
<div class="flex flex-col items-center justify-center mb-section-gap">
<button aria-label="Upload profile picture" class="relative group focus:outline-none focus:ring-2 focus:ring-primary rounded-full">
<div class="w-[96px] h-[96px] rounded-full border-2 border-dashed border-primary flex items-center justify-center bg-surface-2 overflow-hidden transition-all duration-200 group-hover:bg-surface-variant group-hover:border-primary-fixed">
<span class="material-symbols-outlined text-[32px] text-primary group-hover:scale-110 transition-transform duration-200">photo_camera</span>
</div>
<!-- Optional hover glow -->
<div class="absolute inset-0 rounded-full shadow-[0_0_15px_rgba(107,217,199,0.0)] group-hover:shadow-[0_0_20px_rgba(107,217,199,0.3)] transition-shadow duration-300 pointer-events-none"></div>
</button>
<span class="text-label-caps font-label-caps text-text-tertiary mt-4">OPTIONAL</span>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-element-gap flex-1" onsubmit="event.preventDefault();">
<!-- Full Name Input -->
<div class="flex flex-col">
<label class="text-label-caps font-label-caps text-text-secondary mb-2 uppercase" for="fullName">Full Name</label>
<div class="relative">
<input class="w-full h-[56px] bg-bg-surface-2 rounded-xl px-4 text-body-lg font-body-lg text-text-primary placeholder:text-text-tertiary border border-transparent focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="fullName" placeholder="Jean-Pierre Mballa" type="text"/>
</div>
</div>
<!-- Mobile Wallet Auto-Detect -->
<div class="flex flex-col">
<label class="text-label-caps font-label-caps text-text-secondary mb-2 uppercase">Mobile Wallet</label>
<div class="w-full h-[56px] bg-bg-surface-2 rounded-xl px-4 flex items-center justify-between border border-border-subtle">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-secondary">account_balance_wallet</span>
<span class="text-body-lg font-body-lg text-text-secondary">Auto-detected</span>
</div>
<!-- Carrier Chip -->
<div class="h-8 px-3 bg-surface-variant rounded-full flex items-center gap-2 border border-primary-container">
<span class="text-label-caps font-label-caps text-primary">MTN MoMo</span>
<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- City Dropdown -->
<div class="flex flex-col">
<label class="text-label-caps font-label-caps text-text-secondary mb-2 uppercase" for="city">City</label>
<div class="relative">
<select class="w-full h-[56px] bg-bg-surface-2 rounded-xl px-4 appearance-none text-body-lg font-body-lg text-text-primary border border-transparent focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none cursor-pointer" id="city">
<option selected="" value="douala">Douala</option>
<option value="yaounde">Yaoundé</option>
<option value="bafoussam">Bafoussam</option>
<option value="bamenda">Bamenda</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary">expand_more</span>
</div>
</div>
</div>
<!-- Agency Toggle -->
<div class="flex items-center justify-between h-[56px] mt-2 px-4 bg-bg-surface-2 rounded-xl border border-border-subtle">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-secondary">corporate_fare</span>
<span class="text-body-lg font-body-lg text-text-primary">I manage for an agency</span>
</div>
<!-- Custom Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 top-0.5 left-0.5 checked:left-auto checked:right-0.5 border-transparent transition-all duration-300" id="agencyToggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-7 rounded-full bg-surface-variant cursor-pointer transition-colors duration-300" for="agencyToggle"></label>
</div>
</div>
<!-- Spacer to push button to bottom -->
<div class="flex-1 min-h-[32px]"></div>
<!-- Primary Action Button -->
<button class="w-full h-[56px] bg-primary hover:bg-accent-hover text-on-primary text-body-lg font-body-lg font-semibold rounded-xl flex items-center justify-center gap-2 transition-all duration-200 shadow-[0_0_20px_rgba(107,217,199,0.15)] hover:shadow-[0_0_25px_rgba(107,217,199,0.25)] active:scale-[0.98] mt-auto" type="submit">
                Continue
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</main>
<script>
        // Simple script to handle toggle visual state if needed for older browsers,
        // though the CSS handles it nicely above.
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('agencyToggle');
            const toggleLabel = document.querySelector('.toggle-label');
            
            toggle.addEventListener('change', function() {
                if(this.checked) {
                    toggleLabel.classList.remove('bg-surface-variant');
                    toggleLabel.classList.add('bg-primary');
                } else {
                    toggleLabel.classList.add('bg-surface-variant');
                    toggleLabel.classList.remove('bg-primary');
                }
            });
        });
    </script>
<script src="nav_interceptor.js"></script>
</body></html>
