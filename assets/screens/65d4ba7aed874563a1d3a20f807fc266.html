<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background flex items-center px-container-padding h-cta-height w-full docked full-width top-0 z-50">
<button class="transition-colors duration-200 hover:bg-surface-container dark:hover:bg-surface-container p-2 rounded-full -ml-2">
<span class="material-symbols-outlined text-primary dark:text-primary">arrow_back</span>
</button>
<h1 class="ml-4 font-display-title text-display-title text-on-background dark:text-on-background">Your consents</h1>
</header>
<main class="flex-1 px-container-padding pt-4 overflow-y-auto custom-scrollbar pb-32">
<div class="mb-8">
<p class="text-on-surface-variant font-subheader text-subheader opacity-80">You stay in control at all times.</p>
</div>
<!-- Consent Stack -->
<div class="flex flex-col gap-stack-gap">
<!-- Row 1: WhatsApp -->
<div class="h-row-height-lg bg-surface-variant/40 border border-outline/10 rounded-xl px-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">chat_bubble</span>
</div>
<div>
<h3 class="font-subheader text-on-surface">WhatsApp notifications</h3>
<p class="text-on-surface-variant text-label-sm">Receive receipts and reminders via WhatsApp</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer toggle-checkbox" type="checkbox"/>
<div class="w-11 h-6 bg-slate-700 rounded-full transition-colors duration-200 toggle-track">
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 toggle-thumb"></div>
</div>
</label>
</div>
<!-- Row 2: Terms (Required) -->
<div class="h-row-height-lg bg-surface-variant/40 border border-outline/10 rounded-xl px-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">school</span>
</div>
<div>
<h3 class="font-subheader text-on-surface">I accept the Terms</h3>
<a class="text-primary text-label-sm underline" href="#">Read T&amp;Cs</a>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer toggle-checkbox" id="terms-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-slate-700 rounded-full transition-colors duration-200 toggle-track">
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 toggle-thumb"></div>
</div>
</label>
</div>
<!-- Row 3: Privacy (Required) -->
<div class="h-row-height-lg bg-surface-variant/40 border border-outline/10 rounded-xl px-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">shield</span>
</div>
<div>
<h3 class="font-subheader text-on-surface">Privacy Policy</h3>
<a class="text-primary text-label-sm underline" href="#">Read policy</a>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer toggle-checkbox" id="privacy-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-slate-700 rounded-full transition-colors duration-200 toggle-track">
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 toggle-thumb"></div>
</div>

</div>
</div>

</div>

<!-- Bottom Action Container -->

<button class="w-full h-cta-height bg-primary text-on-primary font-bold rounded-xl opacity-30 cursor-not-allowed transition-all duration-300 active:scale-[0.98]" disabled="" id="cta-button">
            I accept
        </button>
<footer class="text-center">
<p class="font-footer-caps text-footer-caps text-outline uppercase tracking-widest">Compliant with Cameroon personal data law.</p>
</footer>

<!-- BottomNavBar (Hidden on focus screens as per mandate, but structure kept if needed) -->
<!-- Suppression logic: This is a transactional/focused screen, so BottomNavBar is omitted -->
<script>
        const termsToggle = document.getElementById('terms-toggle');
        const privacyToggle = document.getElementById('privacy-toggle');
        const ctaButton = document.getElementById('cta-button');

        function updateCTAState() {
            if (termsToggle.checked && privacyToggle.checked) {
                ctaButton.disabled = false;
                ctaButton.classList.remove('opacity-30', 'cursor-not-allowed');
                ctaButton.classList.add('opacity-100', 'cursor-pointer', 'shadow-[0_0_20px_rgba(118,214,213,0.3)]');
            } else {
                ctaButton.disabled = true;
                ctaButton.classList.add('opacity-30', 'cursor-not-allowed');
                ctaButton.classList.remove('opacity-100', 'cursor-pointer', 'shadow-[0_0_20px_rgba(118,214,213,0.3)]');
            }
        }

        termsToggle.addEventListener('change', updateCTAState);
        privacyToggle.addEventListener('change', updateCTAState);

        // Subtle haptic-like feedback simulation
        document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
            toggle.addEventListener('change', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });
    </script>
