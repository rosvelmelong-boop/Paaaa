<style>
        body {
            background-color: #0A1628; /* bg-canvas */
            color: #FFFFFF; /* text-primary */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .glass-orb {
            background: rgba(20, 34, 57, 0.4); /* surface-2 frosted */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(29, 154, 138, 0.15);
        }

        .glass-key {
            background: rgba(26, 43, 69, 0.4); /* bg-surface frosted */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            transition: background 0.15s ease;
        }
        .glass-key:active {
            background: rgba(26, 43, 69, 0.6);
        }

        .pin-dot-filled {
            background: #1D9A8A; /* Primary-ish, using specific teal from prompt */
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3), 0 0 10px rgba(29, 154, 138, 0.4);
        }

        .pin-dot-empty {
            background: rgba(20, 34, 57, 0.4);
            border-top: 1px solid rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .progress-segment-active {
            background: #1D9A8A;
            box-shadow: 0 0 8px rgba(29, 154, 138, 0.5);
        }

<body class="flex items-center justify-center min-h-screen">
<!-- Mobile Canvas 390x844 -->

<!-- 1. Top Bar -->

</div>

<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">arrow_back_ios_new</span>
</button>

<div class="h-1 flex-1 rounded-full progress-segment-active"></div>
<div class="h-1 flex-1 rounded-full bg-surface-2"></div>
<div class="h-1 flex-1 rounded-full bg-surface-2"></div>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center px-gutter pt-2">

<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">dialpad</span>
</div>
<!-- 4. Typography -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-2 font-black">Create your PIN</h1>
<p class="font-body-md text-body-md text-text-secondary max-w-[280px] mx-auto leading-relaxed">
