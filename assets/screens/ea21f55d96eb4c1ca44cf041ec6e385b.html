<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-bg-canvas text-text-primary antialiased min-h-screen flex flex-col pt-safe-area-top pb-safe-area-bottom w-full max-w-[390px] mx-auto overflow-hidden relative">
<!-- Top Bar -->
<header class="w-full h-16 flex justify-between items-center px-gutter flex-shrink-0 z-10">
<button class="w-10 h-10 flex items-center justify-center -ml-2 text-text-primary rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios</span>
</button>
<button class="font-body-sm text-text-secondary hover:text-text-primary transition-colors">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter pt-8 pb-32">
<!-- Hero Illustration -->
<div class="relative w-[200px] h-[200px] flex items-center justify-center mb-6">
<!-- Teal Glow Halo -->
<div class="absolute inset-0 bg-accent-glow rounded-full blur-2xl opacity-60 mix-blend-screen transform scale-110"></div>
<div class="absolute inset-4 bg-teal-brand/10 rounded-full blur-xl"></div>
<!-- Illustration Container (Using generic icon representation for exact request) -->
<div class="relative z-10 w-32 h-32 bg-surface-container-high rounded-full border border-border-subtle shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 1;">cloud_sync</span>
</div>
<!-- Floating Elements -->
<div class="absolute top-4 right-4 w-12 h-12 bg-surface rounded-full shadow-lg border border-border-subtle flex items-center justify-center animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-success text-xl">check_circle</span>
</div>
<div class="absolute bottom-4 left-4 w-10 h-10 bg-surface rounded-full shadow-lg border border-border-subtle flex items-center justify-center animate-bounce" style="animation-delay: 1.5s; animation-duration: 4s;">
<span class="material-symbols-outlined text-primary text-lg">wifi_off</span>
</div>
</div>
<!-- Typography -->
<h1 class="font-display-hero text-custom-h2 text-text-primary text-center mb-4 leading-tight tracking-tight">
            PropVeil works offline
        </h1>
<p class="font-body-sm text-custom-body text-text-secondary text-center max-w-[320px] mb-8">
            View properties, add tenants, and prepare payments without a signal. Everything syncs when you're back online.
        </p>
<!-- Badge Row -->
<div class="flex items-center justify-center gap-3">
<div class="h-8 px-4 bg-bg-surface-2 rounded-xl flex items-center gap-1.5 border border-border-subtle shadow-sm">
<span class="material-symbols-outlined text-[16px] text-primary">check</span>
<span class="font-body-sm text-[12px] font-medium text-text-primary leading-none mt-px">Read offline</span>
</div>
<div class="h-8 px-4 bg-bg-surface-2 rounded-xl flex items-center gap-1.5 border border-border-subtle shadow-sm">
<span class="material-symbols-outlined text-[16px] text-primary">check</span>
<span class="font-body-sm text-[12px] font-medium text-text-primary leading-none mt-px">Auto sync</span>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-gutter pb-safe-area-bottom pt-4 bg-gradient-to-t from-bg-canvas via-bg-canvas to-transparent z-20">
<button class="w-full h-[56px] bg-teal-brand text-text-primary font-body-md font-semibold rounded-[14px] shadow-[0_0_20px_rgba(29,154,138,0.3)] hover:bg-accent-hover hover:shadow-[0_0_24px_rgba(29,154,138,0.5)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center">
            Continue
        </button>
</div>
